{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center">
        <h1>Lista de Personas</h1>
        <a href="/insertar/" class="btn btn-primary">
            <i class="bi bi-plus-lg"></i>
        </a>
    </div>

    <table class="table table-striped mt-3">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Email</th>
                <th>Teléfono</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for persona in personas %}
            <tr>
                <td>{{ persona.id }}</td>
                <td>{{ persona.nombre }}</td>
                <td>{{ persona.email }}</td>
                <td>{{ persona.telefono }}</td>

                <td>
                    <a href="/actualizar/{{ persona.id }}/"class="btn btn-warning btn-sm">
                        <i class="bi bi-pen"></i>
                    </a>
                    <a href="/borrar/{{ persona.id }}/" class="btn btn-danger btn-sm"
                       onclick="return confirm('¿Seguro?');">
                        <i class="bi bi-trash3"></i>
                    </a>
                    <a href="/detalles/{{ persona.id }}/" class="btn btn-info btn-sm">
                        <i class="bi bi-eye-fill"></i>
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
